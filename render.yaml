services:
  - type: web
    name: phoenix-tech-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://phoenix-tech.in
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
